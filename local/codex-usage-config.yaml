# codex-usage 轮询配置
poll:
  interval_seconds: 300

alert:
  # 要做线性预算告警的窗口：primary | secondary
  windows:
    - primary
    - secondary

channels:
  - type: feishu
    app_id: "REPLACE_WITH_APP_ID"
    app_secret: "REPLACE_WITH_APP_SECRET"
    receive_id: "REPLACE_WITH_CHAT_OR_USER_ID"
    receive_id_type: chat_id
