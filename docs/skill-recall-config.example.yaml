# skill-recall 配置示例(starter)
#
# 用法:
#   cp docs/skill-recall-config.example.yaml local/skill-recall-config.yaml
#   编辑 local/skill-recall-config.yaml 改具体配置
#
# 注意:
# - local/ 是 git-ignored,真实配置放那里
# - MINIMAX_API_KEY 等 secret 走 .env 文件,不写明文进这个 yaml
# - sessions/ 是 append-only,永不编辑/删除(SPEC §3.8)

# === 全局配置 ===
storage:
  enabled: true                                # 是否保留原始日志副本
  base_path: ~/Documents/projects/skill-recall-data
  # append-only, 永不编辑/删除 — 不要在这里加 retention_days

incremental:
  cache_path: ~/Documents/projects/skill-recall-data/.cache/processed.json
  fallback_window: 7d                          # cache miss 时回退到这个时间窗

llm_fallback:
  enabled: true
  provider: minimax-anthropic
  base_url: https://api.minimaxi.com/anthropic
  model: MiniMax-2.7
  # key 从环境变量读,绝不写明文
  # 在 ~/Documents/projects/node-scripts/.env 设置: MINIMAX_API_KEY=sk-xxxxx
  api_key_env: MINIMAX_API_KEY
  budget_per_run: 100                          # 单次跑最多 LLM 调用次数

reporting:
  weekly_output: ~/Documents/projects/skill-recall-data/reports/weekly-{week}.md
  push_to_im: true                             # CC_SESSION_KEY 非空时推 IM

# === 注册要分析的 skill ===
# 第一版 starter — 覆盖 4 种典型场景(SPEC §3.6)
registered_skills:

  # lookup 类:该查没查
  - name: unblock-recipes
    enabled: true
    extract_from_skill_md: true                # 从 SKILL.md 程序化提取
    use_llm_extraction: true                   # LLM 提取隐含约束

  # routing 类:戴对帽没
  - name: hat
    enabled: true
    extract_from_skill_md: true
    use_llm_extraction: true

  # sink 类:该写没写
  - name: experience-summary
    enabled: true
    extract_from_skill_md: true
    use_llm_extraction: true

  # pipeline 类:走完没
  - name: flow-dev-task
    enabled: true
    extract_from_skill_md: true
    use_llm_extraction: true
    # 长 pipeline,重点关注 stage drop-off
    extra_focus:
      - Stage 1 brainstorm 是否在新功能 task 跑了
      - Stage 5 是否做了 TDD
      - Stage 6 verification 是否真跑

